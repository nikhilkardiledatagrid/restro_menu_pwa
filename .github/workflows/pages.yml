name: Deploy standalone.html to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
# redeploy trigger
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build site (copy standalone.html → index.html + assets + sw.js)
        run: |
          mkdir -p _site
          cp public/standalone.html _site/index.html
          cp -r public/menu-images _site/menu-images
          cp public/sw.js _site/sw.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
